name: CI

on:
  push:
    branches: ["main", "project/**"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.5"
          elixir-version: "1.19.5"

      - name: Install dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test
